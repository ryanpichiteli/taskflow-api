services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    ports:
      - "5432:5432"
    volumes:
      - taskflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: taskflow-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/taskflow
      DB_USERNAME: taskflow
      DB_PASSWORD: taskflow
      JWT_SECRET: c3VwZXItc2VjcmV0LWRldi1vbmx5LWNoYW5nZS1pbi1wcm9kdWN0aW9uLXRhc2tmbG93LWFwaS1rZXk=
    ports:
      - "8080:8080"

volumes:
  taskflow-pgdata:
